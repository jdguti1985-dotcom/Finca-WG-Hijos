<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WG e Hijos - Acceso</title>
    <style>
        body { background-color: #1e8f62; color: white; font-family: sans-serif; text-align: center; padding: 50px; margin: 0; }
        .card { background: white; color: #333; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.3); width: 90%; max-width: 350px; }
        input { display: block; margin: 15px auto; padding: 12px; width: 100%; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background: #1e8f62; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 5px; font-weight: bold; width: 100%; font-size: 16px; }
        button:hover { background: #156d4a; }
        p { color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>WG e Hijos</h1>
        <p>Gestión ganadera · Acceso privado</p>
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="password" placeholder="Contraseña">
        <button id="loginBtn">Ingresar</button>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
      
      // Tu configuración de Firebase
      const firebaseConfig = {
        apiKey: "AIzaSyAISQ_p-BFAS4zdvYKSlAMUGf84cGfEQLM",
        authDomain: "wg-e-hijos.firebaseapp.com",
        projectId: "wg-e-hijos",
        storageBucket: "wg-e-hijos.firebasestorage.app",
        messagingSenderId: "972986421575",
        appId: "1:972986421575:web:5317769e38e6e580e06001"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      // Lógica para el botón de ingreso
      document.getElementById('loginBtn').addEventListener('click', () => {
          const email = document.getElementById('email').value;
          const pass = document.getElementById('password').value;

          signInWithEmailAndPassword(auth, email, pass)
            .then(() => {
                // Si es correcto, redirige al panel
                window.location.href = "dashboard.html";
            })
            .catch((error) => {
                alert("Acceso denegado. Verifica tus datos de usuario.");
            });
      });
    </script>
</body>
</html>
